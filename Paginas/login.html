<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Alma Nómada</title>
    <link rel="stylesheet" href="./../Estilos/registro.css">
</head>
<body>

    <div class="container">
        <div class="form-card">
            <div class="header">
                <h2>Bienvenido de Nuevo</h2>
                <p>Ingresa tus credenciales para continuar tu viaje</p>
            </div>

            <form action="./../ArchivosPHP/validar_login.php" method="post">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="usuario@correo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <div class="footer-link" style="text-align: center; margin-top: 20px;">
                <p style="font-size: 14px; color: #546e7a;">
                    ¿No tienes cuenta? <a href="registro.html" style="color: #1e88e5; text-decoration: none; font-weight: bold;">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
